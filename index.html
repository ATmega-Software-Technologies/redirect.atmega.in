<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Opening WhatsApp...</title>

<script>
const phone = "918072450722";
const message = "Hi, I got your number from your visiting card.";

const encodedMessage = encodeURIComponent(message);

const whatsappApp = `whatsapp://send?phone=${phone}&text=${encodedMessage}`;
const whatsappWeb = `https://wa.me/${phone}?text=${encodedMessage}`;

function openWhatsApp() {
  const start = Date.now();

  window.location.href = whatsappApp;

  setTimeout(function() {
    if (Date.now() - start < 2000) {
      window.location.href = whatsappWeb;
    }
  }, 1500);
}

window.onload = openWhatsApp;
</script>

<style>
body{
  font-family: system-ui;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f5f5f5;
}
</style>
</head>

<body>
Opening WhatsApp chat...
</body>
</html>
